<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Лучший ВПН в мире</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,700;0,900;1,700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5efe6;
    --bg2: #ede3d5;
    --card: #faf6f0;
    --brown: #6b4c2a;
    --brown-light: #a07850;
    --accent: #c9773a;
    --text: #3a2e24;
    --muted: #9c8878;
    --border: rgba(107,76,42,.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* subtle dot pattern */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(107,76,42,.12) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 0;
  }

  /* warm blob */
  body::after {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(201,119,58,.15), transparent 70%);
    top: -150px; right: -150px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }

  .hero {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 70px 24px 90px;
    gap: 0;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(107,76,42,.1);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 7px 20px;
    font-size: 11px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--brown-light);
    font-weight: 600;
    margin-bottom: 30px;
    animation: fadeDown .7s ease both;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 7.5vw, 5rem);
    font-weight: 900;
    line-height: 1.1;
    text-align: center;
    color: var(--brown);
    margin-bottom: 28px;
    animation: fadeDown .8s .1s ease both;
  }

  h1 em {
    font-style: italic;
    background: linear-gradient(135deg, var(--accent), var(--brown));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* photo card */
  .photo-wrap {
    position: relative;
    width: min(360px, 85vw);
    animation: fadeUp .9s .2s ease both;
    margin-bottom: 40px;
  }

  .photo-wrap::before {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 30px;
    background: linear-gradient(145deg, var(--accent), var(--bg2), var(--brown-light));
    z-index: -1;
    animation: borderSpin 6s linear infinite;
  }

  @keyframes borderSpin {
    0%   { background: linear-gradient(145deg, var(--accent), var(--bg2), var(--brown-light)); }
    50%  { background: linear-gradient(325deg, var(--brown-light), var(--bg2), var(--accent)); }
    100% { background: linear-gradient(145deg, var(--accent), var(--bg2), var(--brown-light)); }
  }

  .photo-wrap img {
    width: 100%;
    border-radius: 28px;
    display: block;
    object-fit: cover;
  }

  /* quote block */
  .quote {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 32px 36px;
    max-width: 520px;
    width: 100%;
    margin-bottom: 44px;
    animation: fadeUp .9s .35s ease both;
    box-shadow: 0 8px 40px rgba(107,76,42,.08);
    position: relative;
  }

  .quote::before {
    content: '"';
    position: absolute;
    top: -18px;
    left: 28px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 80px;
    color: var(--accent);
    line-height: 1;
    opacity: .35;
  }

  .quote p {
    font-size: 1.05rem;
    line-height: 1.75;
    color: var(--text);
    font-weight: 400;
  }

  .quote p + p { margin-top: 10px; }

  .quote .highlight {
    font-weight: 700;
    color: var(--accent);
  }

  /* features */
  .features {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 560px;
    margin-bottom: 50px;
    animation: fadeUp .9s .45s ease both;
  }

  .feat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 20px;
    flex: 1 1 150px;
    max-width: 170px;
    text-align: center;
    transition: transform .2s, box-shadow .2s;
    box-shadow: 0 4px 20px rgba(107,76,42,.06);
  }

  .feat:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(107,76,42,.12);
  }

  .feat-single {
    max-width: 340px;
    flex: unset;
    padding: 22px 36px;
  }

  .feat-single .title { font-size: 1rem; }
  .feat .title { font-family: 'Cormorant Garamond', serif; font-size: .8rem; font-weight: 700; color: var(--brown); margin-bottom: 4px; }
  .feat .desc  { font-size: .75rem; color: var(--muted); line-height: 1.5; }

  /* CTA */
  .cta { animation: fadeUp .9s .55s ease both; text-align: center; }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--brown) 100%);
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: .95rem;
    font-weight: 700;
    letter-spacing: .04em;
    padding: 20px 50px;
    border-radius: 999px;
    text-decoration: none;
    transition: transform .2s, box-shadow .2s;
    box-shadow: 0 8px 28px rgba(107,76,42,.28);
  }

  .cta-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 14px 40px rgba(107,76,42,.38);
  }

  .cta-btn .tg-icon {
    width: 22px; height: 22px;
    fill: #fff;
    flex-shrink: 0;
  }

  .fine {
    margin-top: 16px;
    font-size: .78rem;
    color: var(--muted);
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
